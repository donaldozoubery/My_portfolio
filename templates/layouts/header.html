{% load static %}
<header id="header" class="header">
  <nav id="navbar" class="navbar">
  <div class="container">
      <div class="navbar-brand">
        <a href="/" class="brand-link">
          <span class="brand-logo">DZ</span>
          <span class="brand-text">Donaldo ZOUBERY</span>
        </a>
      </div>

      <div class="navbar-menu" id="navbar-menu">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}">
              <i class="fas fa-home"></i>
              <span>Accueil</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}#about">
              <i class="fas fa-user"></i>
              <span>À propos</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}#skills">
              <i class="fas fa-code"></i>
              <span>Compétences</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}#portfolio">
              <i class="fas fa-briefcase"></i>
              <span>Portfolio</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}#certifications">
              <i class="fas fa-certificate"></i>
              <span>Certifications</span>
            </a>
          </li>
          <li class="nav-item seo-only" style="display: none;">
            <a class="nav-link" href="{% url 'blog_list' %}">
              <i class="fas fa-blog"></i>
              <span>Blog</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}#contact">
              <i class="fas fa-envelope"></i>
              <span>Contact</span>
            </a>
          </li>
        </ul>
        
        <div class="navbar-cta">
          <a class="nav-link nav-link-cta" href="{% url 'digital_cv' %}" target="_blank">
            <i class="fas fa-download"></i>
            <span>CV Digital</span>
          </a>
        </div>
      </div>

      <div class="navbar-actions">
        <button class="navbar-toggle" id="navbar-toggle">
          <span class="hamburger">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
          </span>
        </button>
      </div>
    </div>
  </nav>
</header>

<style>
/* ========================================
   NAVIGATION MODERNE
   ======================================== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: var(--z-fixed);
  background: rgba(15, 15, 35, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  transition: all var(--transition-normal);
}

.navbar {
  padding: 1rem 0;
}

.navbar .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.brand-link {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  text-decoration: none;
  color: var(--text-primary);
  font-weight: 700;
  font-size: 1.25rem;
  transition: all var(--transition-normal);
}

.brand-link:hover {
  color: var(--primary-color);
  transform: scale(1.05);
}

.brand-logo {
  width: 40px;
  height: 40px;
  background: var(--gradient-primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 1.125rem;
  box-shadow: var(--shadow-glow);
}

.brand-text {
  font-family: var(--font-display);
}

.navbar-menu {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.navbar-nav {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  list-style: none;
  margin: 0;
  padding: 0;
}

.navbar-cta {
  display: flex;
  align-items: center;
}

.nav-item {
  position: relative;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 0.8rem;
  color: var(--text-secondary);
  text-decoration: none;
  font-weight: 500;
  font-size: 0.8rem;
  border-radius: var(--border-radius-lg);
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}

.nav-link::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
  transition: left 0.5s;
}

.nav-link:hover::before {
  left: 100%;
}

.nav-link:hover,
.nav-link.active {
  color: var(--primary-color);
  background: rgba(99, 102, 241, 0.1);
  transform: translateY(-2px);
}

.nav-link i {
  font-size: 0.85rem;
  width: 14px;
  text-align: center;
}

.nav-link-cta {
  background: var(--gradient-primary);
  color: white !important;
  box-shadow: var(--shadow-glow);
  font-weight: 600;
  padding: 0.6rem 1.2rem;
  font-size: 0.85rem;
}

.nav-link-cta:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-glow), var(--shadow-xl);
  color: white !important;
}

.navbar-actions {
  display: flex;
  align-items: center;
  gap: 1rem;
}

/* Bouton thème supprimé - mode sombre permanent */

/* Styles du bouton thème supprimés - mode sombre permanent */

.navbar-toggle {
  display: none;
  width: 40px;
  height: 40px;
  border: none;
  background: transparent;
  cursor: pointer;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
}

.hamburger-line {
  width: 24px;
  height: 2px;
  background: var(--text-primary);
  border-radius: 1px;
  transition: all var(--transition-normal);
}

.navbar-toggle.active .hamburger-line:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}

.navbar-toggle.active .hamburger-line:nth-child(2) {
  opacity: 0;
}

.navbar-toggle.active .hamburger-line:nth-child(3) {
  transform: rotate(-45deg) translate(7px, -6px);
}

/* ========================================
   RESPONSIVE DESIGN
   ======================================== */
@media (max-width: 768px) {
  .navbar .container {
    padding: 0 1rem;
  }
  
  .navbar-menu {
    position: fixed;
    top: 100%;
    left: 0;
    right: 0;
    background: rgba(15, 15, 35, 0.98);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    transform: translateY(-100%);
    opacity: 0;
    visibility: hidden;
    transition: all var(--transition-normal);
    padding: 1rem 0;
  }
  
  .navbar-menu.active {
    transform: translateY(0);
    opacity: 1;
    visibility: visible;
  }
  
  .navbar-nav {
    flex-direction: column;
    gap: 0.5rem;
    padding: 1rem 0;
  }
  
  .nav-item {
    width: 100%;
  }
  
  .nav-link {
    width: 100%;
    justify-content: flex-start;
    padding: 1rem 2rem;
    border-radius: 0;
  }
  
  .navbar-toggle {
    display: flex;
  }
  
  .brand-text {
    display: none;
  }
}

@media (max-width: 480px) {
  .navbar .container {
    padding: 0 0.75rem;
  }
  
  .brand-logo {
    width: 35px;
    height: 35px;
    font-size: 1rem;
  }
}

/* ========================================
   ANIMATIONS
   ======================================== */
@keyframes slideDown {
  from {
    transform: translateY(-100%);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.header {
  animation: slideDown 0.6s ease-out;
}

.nav-link {
  animation: fadeInUp 0.6s ease-out;
}

.nav-item:nth-child(1) .nav-link { animation-delay: 0.1s; }
.nav-item:nth-child(2) .nav-link { animation-delay: 0.2s; }
.nav-item:nth-child(3) .nav-link { animation-delay: 0.3s; }
.nav-item:nth-child(4) .nav-link { animation-delay: 0.4s; }
.nav-item:nth-child(5) .nav-link { animation-delay: 0.5s; }
.nav-item:nth-child(6) .nav-link { animation-delay: 0.6s; }
.nav-item:nth-child(7) .nav-link { animation-delay: 0.7s; }
.nav-item:nth-child(8) .nav-link { animation-delay: 0.8s; }
</style>

<script>
// Navigation mobile toggle
document.addEventListener('DOMContentLoaded', function() {
    const navbarToggle = document.getElementById('navbar-toggle');
    const navbarMenu = document.getElementById('navbar-menu');
    
    if (navbarToggle && navbarMenu) {
        navbarToggle.addEventListener('click', function() {
            navbarToggle.classList.toggle('active');
            navbarMenu.classList.toggle('active');
        });
        
        // Fermer le menu lors du clic sur un lien
        const navLinks = navbarMenu.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navbarToggle.classList.remove('active');
                navbarMenu.classList.remove('active');
            });
        });
    }
    
    // Mode sombre permanent - pas de toggle nécessaire
    const body = document.body;
    body.classList.add('dark');
    
    // Simple active state management based on current page
    const currentPath = window.location.pathname;
    const currentHash = window.location.hash;
    
    // Remove active class from all nav links
    const navLinks = document.querySelectorAll('.nav-link');
    navLinks.forEach(link => {
        link.classList.remove('active');
    });
    
    // Set active state based on current page
    if (currentPath === '/' || currentPath === '/home/') {
        // Home page - check hash for section
        if (currentHash === '#about') {
            document.querySelector('a[href*="#about"]')?.classList.add('active');
        } else if (currentHash === '#skills') {
            document.querySelector('a[href*="#skills"]')?.classList.add('active');
        } else if (currentHash === '#contact') {
            document.querySelector('a[href*="#contact"]')?.classList.add('active');
        } else {
            document.querySelector('a[href="{% url 'home' %}"]')?.classList.add('active');
        }
    } else if (currentPath.includes('/projects/')) {
        document.querySelector('a[href="{% url 'project_list' %}"]')?.classList.add('active');
    } else if (currentPath.includes('/certifications/')) {
        document.querySelector('a[href="{% url 'certification_list' %}"]')?.classList.add('active');
    } else if (currentPath.includes('/blog/')) {
        document.querySelector('a[href="{% url 'blog_list' %}"]')?.classList.add('active');
    }
});
</script>
