# Configuration pour le déploiement sur Render
# Documentation: https://render.com/docs

services:
  # Service principal - Application Django
  - type: web
    name: donaldo-portfolio
    env: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: donaldo-portfolio.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: donaldo-portfolio-db
          property: connectionString
      - key: CLOUD_NAME
        sync: false
      - key: CLOUD_API_KEY
        sync: false
      - key: CLOUD_API_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: RECAPTCHA_PUBLIC_KEY
        sync: false
      - key: RECAPTCHA_PRIVATE_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
    branch: main

  # Base de données PostgreSQL
  - type: pserv
    name: donaldo-portfolio-db
    env: postgresql
    plan: starter
    ipAllowList: []

# Variables d'environnement globales
envVars:
  - key: PYTHON_VERSION
    value: 3.11.0
  - key: NODE_VERSION
    value: 18.17.0
